iority: <span style=&quot;color:var(--amb);font-weight:700;font-size:13px;&quot;>9/10</span></div></nav><div id=&quot;pb&quot; style=&quot;width:25%&quot;></div><div id=&quot;sw&quot;><div class=&quot;sec active&quot; id=&quot;s0&quot;>
<div class=&quot;eye au d1&quot; style=&quot;--acc:var(--amb)&quot;>The Problem — Reactive Sales</div>
<h1 class=&quot;d au d2&quot;><span class=&quot;p&quot;>1,580 contacts</span> in IN2CRM.<br>Never contacted. Scored. Enriched.<br>Sitting there.</h1>
<div class=&quot;qb&quot; style=&quot;border-left-color:var(--amb);&quot;><div class=&quot;qt&quot;>&quot;We have thousands of relations in IN2CRM. Too many to contact, too many to focus on. We lack a clear overview of which ones match our sales strategy.&quot;</div><div class=&quot;qa&quot; style=&quot;color:var(--amb);&quot;>Koen Nijenhuis — Deputy Managing Director (survey)</div></div>

</div>
<div class=&quot;g2 au d4&quot;>
<div>
<div style=&quot;font-size:12px;font-weight:700;color:var(--t2);margin-bottom:14px;text-transform:uppercase;letter-spacing:.08em;&quot;>The current situation</div>
<div class=&quot;hw&quot;><div class=&quot;hwi&quot;>📞</div><div><div class=&quot;hwn&quot;>Daily</div><div class=&quot;hwt&quot;>Team responds to inbound only</div><div class=&quot;hwd&quot;>No morning call list. No priority ranking. No structure.</div></div></div>
<div class=&quot;hw&quot;><div class=&quot;hwi&quot;>🔇</div><div><div class=&quot;hwn&quot;>No alerts</div><div class=&quot;hwt&quot;>High-value customers go dark — unnoticed</div><div class=&quot;hwd&quot;>A customer who ordered €50k/year and went silent 90 days ago: no flag.</div></div></div>
<div class=&quot;hw&quot;><div class=&quot;hwi&quot;>📊</div><div><div class=&quot;hwn&quot;>Unused</div><div class=&quot;hwt&quot;>1,580 enriched contacts in the system</div><div class=&quot;hwd&quot;>Geocoded, industry-classified, scored. Never touched.</div></div></div>

</div></div><div class=&quot;sec&quot; id=&quot;s1&quot;><div class=&quot;eye au d1&quot;>The Solution &amp;#8212; Three-Layer Intelligence Engine</div><h1 class=&quot;d au d2&quot;>Active clients scored. Dormant ones flagged.<br><em>New prospects found from the internet.</em></h1><div class=&quot;g2 au d3&quot;><div><div style=&quot;font-size:12px;font-weight:700;color:var(--t2);margin-bottom:14px;text-transform:uppercase;letter-spacing:.08em;&quot;>Layer 1 &amp;#8212; Active client intelligence</div><div class=&quot;hw&quot;><div class=&quot;hwi&quot;>&amp;#x1F4CA;</div><div><div class=&quot;hwn&quot;>Daily scoring engine</div><div class=&quot;hwt&quot;>Recency (30%) + order value (25%) + segment match (20%) + visit frequency (15%) + external signals (10%)</div><div class=&quot;hwd&quot;>Updated at 08:00 in Harry's existing PowerBI. Shell Pernis normally orders monthly &amp;#8212; 47 days of silence puts them top of the call list automatically.</div></div></div><div class=&quot;hw&quot;><div class=&quot;hwi&quot;>&amp;#x1F527;</div><div><div class=&quot;hwn&quot;>Spare parts signal</div><div class=&quot;hwt&quot;>3+ spare orders in 6 months &amp;#8594; revision alert fires to Philip and inside sales</div><div class=&quot;hwd&quot;>When a client accumulates repeated spare part orders &amp;#8212; valve seats, spring hangers, clamp components &amp;#8212; the engine flags it as an end-of-life signal. Philip gets an alert with estimated project value. Works for both GR1 valves and GR3 Lisega pipe supports.</div></div></div><div class=&quot;hw&quot;><div class=&quot;hwi&quot;>&amp;#x1F534;</div><div><div class=&quot;hwn&quot;>At-risk detection</div><div class=&quot;hwt&quot;>High-value client silent beyond their normal cycle &amp;#8594; alert fires to Koen + Philip</div><div class=&quot;hwd&quot;>No account drifts away unnoticed. Every gap beyond the expected ordering frequency triggers a flag before the customer picks up the phone to a competitor.</div></div></div><div style=&quot;font-size:12px;font-weight:700;color:var(--t2);margin-bottom:14px;margin-top:18px;text-transform:uppercase;letter-spacing:.08em;&quot;>Layer 2 &amp;#8212; Dormant reactivation</div><div class=&quot;hw&quot;><div class=&quot;hwi&quot;>&amp;#x1F7E0;</div><div><div class=&quot;hwn&quot;>Former clients silent 60&amp;#8211;180 days</div><div class=&quot;hwt&quot;>Ranked by re-engagement value &amp;#8212; highest-spend dormant accounts first</div><div class=&quot;hwd&quot;>Petrogas Rotterdam: 89 days silent, &amp;#8364;28k last order &amp;#8212; top of the dormant list. One-click Dutch reactivation script generated per contact, referencing their last order and Hanwel's expertise for their segment.</div></div></div></div><div><div style=&quot;font-size:12px;font-weight:700;color:var(--t2);margin-bottom:14px;text-transform:uppercase;letter-spacing:.08em;&quot;>Layer 3 &amp;#8212; New prospect discovery via internet scraping, scored directly in CRM</div><div class=&quot;nsc&quot;><div class=&quot;nsi&quot;>&amp;#x1F310;</div><div><div class=&quot;nst&quot;>Untouched IN2CRM contacts get a score based on real intelligence &amp;#8212; written back directly to their CRM record</div><div class=&quot;nsd&quot;>Every company in IN2CRM that has never ordered is automatically enriched by a web scraping agent: LinkedIn vacancies, planning permits, investment announcements, and press releases. These signals feed the same scoring engine used for active clients. The resulting score is written directly back to the IN2CRM contact record &amp;#8212; so Philip sees one ranked list including both existing clients and never-contacted prospects, weighted by buying intent.</div></div></div><div class=&quot;nsc&quot;><div class=&quot;nsi&quot;>&amp;#x1F4F0;</div><div><div class=&quot;nst&quot;>Real signals found in the current prospect list</div><div class=&quot;nsd&quot;>Elementis Delden: 3 maintenance engineer vacancies + boiler house planning permit filed January 2026 &amp;#8594;
